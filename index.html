<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
        <title>ToDoList</title>
    </head>
    <body>
        <section class="container">
            <div class="txt1">My To Do List</div>
            <input id="task" class="inpt" placeholder="Task...">
            <span id="add" class="add-btn">Add</span>
        </section>

        <section class="task-list">
            <ul id="taskList"></ul>
        </section>

        <section class="checked-task">
            <div class="txt2">Completed Tasks</div>
            <ul id="checkedtask"></ul>
        </section>

        <script src="script.js"></script>
    </body>
</html>
